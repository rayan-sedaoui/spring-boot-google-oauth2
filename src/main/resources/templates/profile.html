<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mon Profil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h3>Profil Utilisateur</h3>
                </div>
                <div class="card-body text-center" th:if="${user != null}">
                    <img th:src="${user.attributes['picture']}"
                         class="rounded-circle mb-3 shadow-sm"
                         alt="Photo" width="120">

                    <h4 class="card-title" th:text="${user.attributes['name']}">Nom</h4>
                    <p class="card-text text-muted" th:text="${user.attributes['email']}">Email</p>

                    <hr>

                    <a href="/logout" class="btn btn-danger">Se déconnecter</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
